name: Copy code sang Tai khoan B (Thu cong)

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Copy code tu A sang B
        env:
          MY_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "🔄 Bắt đầu sync từ TK A → TK B..."
          
          # Cấu hình Git
          git config --global user.email "trongtt.landtrack@gmail.com"
          git config --global user.name "Sync Bot"
          
          # 1. Clone kho A
          echo "📥 Cloning từ LandTrack_V2..."
          git clone --bare https://x-access-token:${MY_TOKEN}@github.com/tranthetrong/LandTrack_V2.git temp_repo.git
          
          cd temp_repo.git
          
          # 2. Mirror push sang kho B (Nhanh nhất, đầy đủ nhất)
          echo "📤 Pushing sang Landtrack..."
          git push --mirror https://x-access-token:${MY_TOKEN}@github.com/trongtt-landtrack/Landtrack.git
          
          PUSH_STATUS=$?
          
          cd ..
          rm -rf temp_repo.git
          
          # 3. Verify
          if [ $PUSH_STATUS -eq 0 ]; then
            echo "✅ SYNC THÀNH CÔNG! Code đã được update ở kho B"
          else
            echo "❌ Push thất bại! Status: $PUSH_STATUS"
            exit 1
          fi
