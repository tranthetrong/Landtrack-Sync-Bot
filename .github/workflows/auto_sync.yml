name: Copy code sang Tai khoan B (Thu cong)

on:
  workflow_dispatch: # Chạy thủ công

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Repository
        env:
          MY_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # 1. Clone mirror từ kho A (Lấy toàn bộ branch, tag, commit)
          # Sử dụng --mirror để đảm bảo bản sao hoàn hảo
          git clone --mirror https://x-access-token:${MY_TOKEN}@github.com/tranthetrong/LandTrack_V2.git temp_repo
          
          cd temp_repo
          
          # 2. Cấu hình định danh (Để tránh lỗi git)
          git config user.email "trongtt.landtrack@gmail.com"
          git config user.name "Sync Bot"
          
          # 3. Push mirror sang kho B
          # Lưu ý: Token này PHẢI có quyền ghi vào kho B
          echo "📤 Đang đẩy dữ liệu sang Tài khoản B..."
          git push --mirror https://x-access-token:${MY_TOKEN}@github.com/trongtt-landtrack/Landtrack.git
          
          echo "✅ Hoàn thành đồng bộ!"
